[main]
# Use iwd as WiFi backend if available, otherwise wpa_supplicant
# wifi.backend=iwd

# Don't scan for new networks at startup — reduces boot noise.
# NM will still autoconnect to saved profiles.
[device]
wifi.scan-rand-mac-address=no

[connection]
# Shorter DHCP timeout so the shell shows "no network" faster if disconnected
ipv4.dhcp-timeout=15
ipv6.dhcp-timeout=15
