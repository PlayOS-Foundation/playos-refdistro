# PlayOS device profile — ASUS ROG Ally (reference runtime device).
# Mirrors the sketch in playos-spec:
#   book/src/12-device-model-and-porting/12-rog-ally-reference.md
# This is a draft; the device-profile schema is defined in
#   playos-spec/schemas/device-profile.schema.json (RFC-0006).

[device]
id = "rog-ally"
name = "ASUS ROG Ally"
targetType = "runtime-device"

[input]
home_button = "asus_armoury"
quick_settings_button = "asus_command_center"
built_in_controls = "gamepad0"
touchscreen = "touch0"

[display]
default_width = 1920
default_height = 1080
refresh_rate = 120

[capabilities]
"input.basic" = true
"input.touch" = true
"display.info" = true
"display.brightness" = true
"power.battery" = true
"system.overlay" = true
